{% extends 'base.html' %}
{% load static %}
{% block content %}
<link rel="stylesheet" href="{% static 'css/style.css' %}">
<div class="container">
  <h1>Subjects</h1>

  <form method="POST">
    {% csrf_token %}
    <div class="form-group">
      <label>Subject Name</label>
      {{ form.name }}
    </div>
    <button type="submit">+ Add Subject</button>
  </form>

  <hr>

  <h2>All Subjects</h2>
  <table>
    <thead>
      <tr>
        <th>#</th>
        <th>Subject Name</th>
        <th colspan="2" style="text-align:center;">Actions</th>
      </tr>
    </thead>
    <tbody>
      {% for subject in allSubjects %}
      <tr>
        <td>{{ forloop.counter }}</td>
        <td>{{ subject.name }}</td>
        <td>
          <form method="POST" action="{% url 'deleteSubject' subject.id %}">
            {% csrf_token %}
            <button class="delete-btn">Delete</button>
          </form>
        </td>
        <td>
          <a href="{% url 'updateSubject' subject.id %}"><button>Edit</button></a>
        </td>
      </tr>
      {% empty %}
      <tr>
        <td colspan="4" style="text-align:center; color:#999; padding:20px;">
          No subjects yet
        </td>
      </tr>
      {% endfor %}
    </tbody>
  </table>
</div>
{% endblock %}
