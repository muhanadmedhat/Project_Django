{% extends 'base.html' %}

{% block content %}
<style>
  body {
    font-family: Arial, Helvetica, sans-serif;
    background: #f4f6f9;
  }

  .content-wrapper {
    padding: 40px 20px;
  }

  .feedback-container {
    max-width: 600px;
    margin: auto;
    background: white;
    padding: 30px;
    border-radius: 10px;
    box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
  }

  h1 {
    text-align: center;
    margin-bottom: 30px;
    color: #333;
    font-size: 28px;
  }

  h2 {
    margin-top: 40px;
    margin-bottom: 20px;
    color: #333;
    font-size: 20px;
    border-bottom: 2px solid #4CAF50;
    padding-bottom: 10px;
  }

  label {
    display: block;
    margin-bottom: 8px;
    font-weight: bold;
    color: #333;
  }

  .form-group {
    margin-bottom: 20px;
  }

  input[type="email"],
  textarea {
    width: 100%;
    padding: 12px;
    border: 1px solid #ccc;
    border-radius: 6px;
    font-family: Arial, sans-serif;
    font-size: 14px;
    box-sizing: border-box;
  }

  input[type="email"]:focus,
  textarea:focus {
    outline: none;
    border-color: #4CAF50;
    box-shadow: 0 0 5px rgba(76, 175, 80, 0.3);
  }

  textarea {
    resize: vertical;
    min-height: 120px;
  }

  button {
    background: #4CAF50;
    color: white;
    border: none;
    padding: 12px 30px;
    border-radius: 6px;
    cursor: pointer;
    font-size: 16px;
    font-weight: bold;
    transition: background 0.3s ease;
    width: 100%;
  }

  button:hover {
    background: #45a049;
  }

  button:active {
    transform: scale(0.98);
  }

  hr {
    margin: 40px 0;
    border: none;
    border-top: 2px solid #e0e0e0;
  }

  /* TABLE */
  table {
    width: 100%;
    border-collapse: collapse;
    margin-top: 20px;
  }

  th {
    background: #4CAF50;
    color: white;
    padding: 15px 10px;
    text-align: left;
    font-weight: bold;
    border-radius: 5px 5px 0 0;
  }

  td {
    padding: 12px 10px;
    border-bottom: 1px solid #ddd;
    color: #333;
  }

  tr:hover {
    background: #f5f5f5;
  }

  tbody tr:last-child td {
    border-bottom: 1px solid #ddd;
  }

  .no-feedback {
    text-align: center;
    color: #999;
    padding: 20px;
    font-style: italic;
  }
</style>

<div class="feedback-container">
  <h1>System Feedback 💬</h1>
  
  <form method="POST">
    {% csrf_token %}
    <div class="form-group">
      <label>Your Email:</label>
      <input type="email" name="email" required>
    </div>
    
    <div class="form-group">
      <label>Message:</label>
      <textarea name="message" required></textarea>
    </div>
    
    <button type="submit">Submit Feedback</button>
  </form>

  <hr>

  <h2>Recent Comments</h2>
  <table>
    <thead>
      <tr>
        <th>Email</th>
        <th>Message</th>
        <th>Date</th>
      </tr>
    </thead>
    <tbody>
      {% for entry in feedbacks %}
      <tr>
        <td>{{ entry.email }}</td>
        <td>{{ entry.message }}</td>
        <td>{{ entry.dateAdded|date:"M d, Y" }}</td>
      </tr>
      {% empty %}
      <tr>
        <td colspan="3" class="no-feedback">No feedback yet.</td>
      </tr>
      {% endfor %}
    </tbody>
  </table>
</div>
{% endblock %}
