{% extends 'base.html' %}
{% load static %}
{% block content %}
<link rel="stylesheet" href="{% static 'css/style.css' %}">
<div class="container">
    <h1>Register</h1>
    <form method="POST">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit">Register</button>
    </form>
    <p style="text-align:center; margin-top:15px;">
        Already have an account? <a href="{% url 'login_view' %}">Login</a>
    </p>
</div>
{% endblock %}
